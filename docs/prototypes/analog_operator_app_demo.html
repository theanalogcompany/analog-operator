<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Analog · operator app · interactive demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --clay: #C66A4A;
    --clay-deep: #A85638;
    --clay-soft: #E5B19C;
    --sand: #F2EBDC;
    --paper: #F7F1E3;
    --parchment: #EDE4D2;
    --stone: #D8CFC0;
    --stone-light: #E8E2D6;
    --ink: #1C1814;
    --ink-soft: #4A4339;
    --ink-faint: #857A6A;
    --hairline: rgba(28, 24, 20, 0.12);
    --hairline-soft: rgba(28, 24, 20, 0.06);
    --inbound: #3A3530;
    --bg: #ECE7DC;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: "Inter Tight", system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  /* Outer page — center the phone */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 16px 48px;
    gap: 20px;
  }

  .page-hint {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    color: var(--ink-faint);
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }
  .page-hint strong { font-style: normal; color: var(--ink-soft); font-weight: 500; font-family: "Inter Tight", sans-serif; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; display: block; margin-bottom: 6px; }

  /* iPhone frame */
  .phone {
    width: 390px;
    height: 844px;
    background: #fff;
    border-radius: 56px;
    box-shadow:
      0 0 0 11px #1c1814,
      0 24px 48px rgba(28, 24, 20, 0.18),
      0 8px 16px rgba(28, 24, 20, 0.08);
    position: relative;
    overflow: hidden;
  }

  .phone-screen {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Status bar / dynamic island / home indicator */
  .status-bar {
    height: 54px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 32px 0;
    flex-shrink: 0;
    z-index: 10;
    pointer-events: none;
  }
  .status-time {
    font-weight: 600;
    font-size: 16px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--ink);
  }
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 124px;
    height: 36px;
    background: #000;
    border-radius: 22px;
    z-index: 11;
    pointer-events: none;
  }
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: var(--ink);
    opacity: 0.85;
    z-index: 12;
  }

  /* Top nav */
  .topnav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 22px 8px;
    flex-shrink: 0;
  }
  .iconbtn {
    background: transparent;
    border: none;
    padding: 6px;
    cursor: pointer;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .iconbtn svg { display: block; }

  .wordmark {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-style: italic;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink);
    display: inline-flex;
    align-items: baseline;
    line-height: 1;
  }
  .wordmark .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--clay);
    margin-left: 2px;
    transform: translateY(-1px);
  }

  /* Logo image variant — replaces styled-text wordmark in production screens */
  .wordmark-img {
    height: 22px;
    width: auto;
    display: block;
  }
  .login-wrap .wordmark-img { height: 28px; margin-bottom: 56px; align-self: center; }

  .counter {
    font-family: "Inter Tight", sans-serif;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.14em;
    min-width: 28px;
    text-align: right;
  }

  /* Greeting + status strip */
  .greeting {
    padding: 6px 22px 0;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 24px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .status-strip {
    padding: 6px 22px 0;
    font-size: 12px;
    color: var(--ink-faint);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-strip .num { color: var(--ink); font-weight: 600; margin-right: 3px; }
  .status-strip .sep { color: var(--ink-faint); opacity: 0.6; }

  /* Card stage */
  .stage {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 18px 0;
    touch-action: pan-y;
    user-select: none;
    overflow: visible;
  }

  /* Drag glows */
  .glow {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 40%;
    pointer-events: none;
    transition: opacity 0.1s;
    z-index: 1;
  }
  .glow-right { right: 0; background: linear-gradient(to left, rgba(198, 106, 74, 0.55), rgba(198, 106, 74, 0)); }
  .glow-left { left: 0; background: linear-gradient(to right, rgba(58, 53, 48, 0.45), rgba(58, 53, 48, 0)); }

  .glow-icon {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #fff;
    pointer-events: none;
    z-index: 2;
    transition: opacity 0.1s, transform 0.1s;
  }
  .glow-icon-right { right: 28px; }
  .glow-icon-left { left: 28px; }

  /* The card itself */
  .card-wrap {
    width: 100%;
    max-width: 354px;
    position: relative;
    z-index: 3;
    will-change: transform;
  }

  .peek {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%) scale(0.965);
    width: 100%;
    max-width: 354px;
    opacity: 0.55;
    pointer-events: none;
    z-index: 2;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    border: 0.5px solid var(--hairline);
    box-shadow:
      0 12px 32px rgba(28, 24, 20, 0.06),
      0 2px 6px rgba(28, 24, 20, 0.04);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 18px 14px;
  }
  .card-header .name {
    font-weight: 500;
    font-size: 15px;
    color: var(--ink);
    white-space: nowrap;
  }
  .card-header .timestamp {
    margin-left: auto;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }

  /* Recognition pills */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px 3px 7px;
    border-radius: 100px;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1;
  }
  .pill .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
  }
  .pill-returning { background: var(--parchment); color: var(--ink-soft); }
  .pill-returning .dot { background: var(--ink-soft); }
  .pill-regular { background: var(--clay-soft); color: #6B3220; }
  .pill-regular .dot { background: var(--clay-deep); }
  .pill-raving { background: var(--clay); color: #fff; }
  .pill-raving .dot { background: #fff; }

  /* Flagged-because */
  .flag {
    margin: 0 16px 14px;
    padding: 12px 14px 13px;
    background: var(--sand);
    border-left: 2px solid var(--clay);
    border-radius: 4px;
  }
  .flag-text {
    margin: 0;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink);
  }
  .flag-eyebrow {
    color: var(--clay-deep);
    font-weight: 600;
    margin-right: 4px;
  }

  /* Hairline divider */
  .divider {
    height: 0.5px;
    background: var(--hairline);
    margin: 0 18px;
  }

  /* Inbound + draft bubbles */
  .thread {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 18px 6px;
  }
  .bubble-inbound {
    background: var(--inbound);
    color: #F0EDE7;
    align-self: flex-start;
    max-width: 86%;
    padding: 10px 14px;
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    font-size: 14px;
    line-height: 1.45;
  }

  .draft-row {
    display: flex;
    justify-content: flex-end;
    padding: 6px 18px 18px;
  }
  .draft {
    position: relative;
    background: #fff;
    color: var(--ink);
    align-self: flex-end;
    max-width: 86%;
    padding: 12px 56px 14px 16px;
    border-radius: 18px;
    border-bottom-right-radius: 6px;
    border: 1px solid var(--clay);
    font-size: 14.5px;
    line-height: 1.5;
  }
  .draft-send {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--clay);
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 6px rgba(198, 106, 74, 0.28);
  }
  .draft-send:hover { background: var(--clay-deep); }
  .draft-send:active { transform: scale(0.94); }
  .draft-send svg { display: block; }

  /* Swipe hint captions */
  .swipe-hints {
    width: 100%;
    max-width: 354px;
    display: flex;
    justify-content: space-between;
    padding: 12px 8px 0;
    font-size: 11px;
    color: var(--ink-faint);
    flex-shrink: 0;
  }
  .swipe-hints .left, .swipe-hints .right { display: inline-flex; align-items: center; gap: 4px; }

  /* Footer */
  .footer {
    padding: 0 22px 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .footer-text {
    font-size: 12px;
    color: var(--ink-faint);
  }
  .footer-text .link {
    color: var(--clay);
    cursor: pointer;
    font-weight: 500;
  }
  .footer-text .link:hover { color: var(--clay-deep); }

  /* Caught-up state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 80px 32px 0;
    text-align: center;
    gap: 14px;
  }
  .empty-mark {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--clay);
    margin-bottom: 8px;
  }
  .empty-title {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 32px;
    line-height: 1.1;
    color: var(--ink);
  }
  .empty-sub {
    font-size: 13px;
    color: var(--ink-faint);
    max-width: 240px;
    line-height: 1.55;
  }
  .reset-btn {
    margin-top: 16px;
    background: transparent;
    color: var(--ink);
    border: 0.5px solid var(--hairline);
    border-radius: 2px;
    font-family: "Inter Tight", sans-serif;
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 16px;
    cursor: pointer;
  }
  .reset-btn:hover { background: var(--paper); }


  /* ---------- FULL-SCREEN EDIT TAKEOVER ---------- */
  .edit-screen {
    position: absolute;
    inset: 0;
    background: #fff;
    z-index: 30;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(.2,.8,.2,1);
  }
  .edit-screen.open { transform: translateX(0); }

  .edit-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 56px 22px 12px;
    flex-shrink: 0;
    background: #fff;
    z-index: 2;
  }
  .edit-topbar .back-btn {
    background: transparent;
    border: none;
    color: var(--ink-soft);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .edit-topbar .recipient {
    font-weight: 500;
    font-size: 15px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .edit-topbar .spacer { width: 60px; }

  /* Pinned flagged-because at top */
  .edit-flag-pin {
    margin: 0 18px 4px;
    padding: 12px 14px 13px;
    background: var(--sand);
    border-left: 2px solid var(--clay);
    border-radius: 4px;
    flex-shrink: 0;
  }
  .edit-flag-pin .flag-text {
    margin: 0;
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink);
  }
  .edit-flag-pin .flag-eyebrow {
    color: var(--clay-deep);
    font-weight: 600;
    margin-right: 4px;
  }

  /* Conversation history scroll area */
  .edit-thread {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .edit-thread .day-divider {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 8px 0 4px;
  }
  .edit-thread .bubble-inbound,
  .edit-thread .bubble-outbound {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.45;
  }
  .edit-thread .bubble-inbound {
    background: var(--inbound);
    color: #F0EDE7;
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }
  .edit-thread .bubble-outbound {
    background: #F2EBE0;
    color: var(--ink);
    align-self: flex-end;
    border-bottom-right-radius: 6px;
    border: 0.5px solid var(--hairline);
  }
  .edit-thread .bubble-time {
    font-size: 10px;
    color: var(--ink-faint);
    align-self: center;
    margin-top: 2px;
    margin-bottom: 2px;
    letter-spacing: 0.04em;
  }

  /* Composer at bottom */
  .edit-composer {
    border-top: 0.5px solid var(--hairline);
    padding: 12px 16px 14px;
    background: #fff;
    flex-shrink: 0;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }
  .edit-composer-input {
    flex: 1;
    border: 1px solid var(--clay);
    border-radius: 18px;
    padding: 10px 14px 11px;
    font-family: "Inter Tight", sans-serif;
    font-size: 14.5px;
    line-height: 1.45;
    color: var(--ink);
    resize: none;
    outline: none;
    background: #fff;
    min-height: 38px;
    max-height: 120px;
    overflow-y: auto;
  }
  .edit-composer-input:focus { border-color: var(--clay-deep); }
  .edit-composer-send {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--clay);
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.05s;
  }
  .edit-composer-send:hover { background: var(--clay-deep); }
  .edit-composer-send:active { transform: scale(0.94); }
  .edit-composer-send:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---------- LOGIN SCREENS ---------- */
  .login-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 40px 28px 0;
  }
  .login-wrap .wordmark { align-self: center; margin-bottom: 56px; }
  .welcome {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-weight: 300;
    font-size: 36px;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: 16px;
  }
  .welcome-sub {
    font-size: 14px;
    color: var(--ink-faint);
    line-height: 1.55;
    margin-bottom: 36px;
  }
  .phone-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
  }
  .country-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 14px 12px;
    background: #fff;
    border: 0.5px solid var(--hairline);
    border-radius: 8px;
    font-size: 14px;
    color: var(--ink);
  }
  .phone-input {
    flex: 1;
    padding: 14px 14px;
    background: #fff;
    border: 0.5px solid var(--hairline);
    border-radius: 8px;
    font-family: "Inter Tight", sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .phone-input:focus { border-color: var(--clay); }
  .phone-input::placeholder { color: var(--ink-faint); }

  .btn-clay {
    background: var(--clay);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: "Inter Tight", sans-serif;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 16px 20px;
    cursor: pointer;
    transition: background 0.15s, transform 0.05s;
    width: 100%;
  }
  .btn-clay:hover { background: var(--clay-deep); }
  .btn-clay:active { transform: scale(0.98); }
  .btn-clay:disabled { opacity: 0.4; cursor: not-allowed; }

  .alt-text {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--ink-faint);
  }
  .alt-text .link { color: var(--clay); cursor: pointer; }

  /* OTP boxes */
  .otp-row {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .otp-box {
    width: 48px;
    height: 56px;
    background: #fff;
    border: 0.5px solid var(--hairline);
    border-radius: 8px;
    text-align: center;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
    font-family: "Inter Tight", sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .otp-box:focus { border: 1.5px solid var(--clay); }

  .countdown {
    text-align: center;
    font-size: 12px;
    color: var(--ink-faint);
    margin-bottom: 12px;
  }
  .countdown .timer { color: var(--ink-soft); font-weight: 500; }
  .countdown .resend { color: var(--clay); cursor: pointer; }
  .countdown .resend.disabled { color: var(--ink-faint); cursor: not-allowed; }

  .back-link {
    margin-top: auto;
    margin-bottom: 24px;
    align-self: flex-start;
    font-size: 12px;
    color: var(--ink-faint);
    cursor: pointer;
  }
  .back-link:hover { color: var(--ink-soft); }

  /* Edit sheet (slides in from right) */
  .edit-sheet-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(28, 24, 20, 0.3);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .edit-sheet-backdrop.open { opacity: 1; pointer-events: auto; }

  .edit-sheet {
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    background: #fff;
    z-index: 21;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
    display: flex;
    flex-direction: column;
  }
  .edit-sheet.open { transform: translateX(0); }

  .edit-sheet-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 56px 22px 12px;
    border-bottom: 0.5px solid var(--hairline);
  }
  .edit-sheet-head .cancel,
  .edit-sheet-head .reset {
    font-size: 14px;
    cursor: pointer;
    background: transparent;
    border: none;
    font-family: inherit;
  }
  .edit-sheet-head .cancel { color: var(--ink-soft); }
  .edit-sheet-head .reset { color: var(--clay); }
  .edit-sheet-head .title {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }
  .edit-sheet-body {
    padding: 14px 22px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .edit-recipient {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 8px;
  }
  .edit-recipient .name { font-weight: 500; font-size: 14px; }
  .edit-textarea {
    flex: 1;
    width: 100%;

/* ======================================================================
   Helpers
   ====================================================================== */
function el(tag, attrs = {}, children = []) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === "class") e.className = attrs[k];
    else if (k === "html") e.innerHTML = attrs[k];
    else if (k.startsWith("on") && typeof attrs[k] === "function") e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else if (k === "style" && typeof attrs[k] === "object") Object.assign(e.style, attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function renderLoginPhone() {
  const screen = document.getElementById("screen");
  screen.innerHTML = "";
  screen.appendChild(StatusBar());

  const wrap = el("div", { class: "login-wrap" });

  const wm = el("img", { class: "wordmark-img", src: LOGO_DATA_URL, alt: "the analog company" });
  wrap.appendChild(wm);

  wrap.appendChild(el("div", { class: "welcome" }, ["Welcome back."]));
  wrap.appendChild(el("div", { class: "welcome-sub" }, [
    "Enter your phone number and we'll send you a code to sign in.",
  ]));

  const inputRow = el("div", { class: "phone-input-row" }, [
    el("div", { class: "country-chip" }, ["🇺🇸 +1"]),
    el("input", {
      class: "phone-input",
      type: "tel",
      placeholder: "(415) 555 — 0123",
      value: state.phone,
      oninput: (e) => { state.phone = e.target.value; updateBtn(); },
    }),
  ]);
  wrap.appendChild(inputRow);

  const btn = el("button", {
    class: "btn-clay",
    onclick: () => {
      state.view = "login-code";
      state.code = ["", "", "", "", "", ""];
      startCountdown();
      render();
    },
  }, ["Send code"]);
  if (!state.phone || state.phone.replace(/\D/g, "").length < 7) btn.disabled = true;
  function updateBtn() {
    btn.disabled = !state.phone || state.phone.replace(/\D/g, "").length < 7;
  }
  wrap.appendChild(btn);

  wrap.appendChild(el("div", { class: "alt-text" }, [
    "or sign in with ",
    el("span", { class: "link" }, ["email instead"]),
  ]));

  // Footer
  const footerSpacer = el("div", { style: { flex: "1" } });
  wrap.appendChild(footerSpacer);

  screen.appendChild(wrap);

  const footer = el("div", { class: "footer" }, [
    el("div", { class: "footer-text" }, [
      "Need help? ",
      el("span", { class: "link" }, ["Chat with Jaipal"]),
    ]),
  ]);
  screen.appendChild(footer);
}

function startCountdown() {
  state.countdown = 30;
  if (state.countdownInterval) clearInterval(state.countdownInterval);
  state.countdownInterval = setInterval(() => {
    state.countdown--;
    if (state.countdown <= 0) {
      clearInterval(state.countdownInterval);
      state.countdownInterval = null;
    }
    if (state.view === "login-code") render();
  }, 1000);
}

/* ======================================================================
   Login: OTP code entry
   ====================================================================== */
function renderLoginCode() {
  const screen = document.getElementById("screen");
  screen.innerHTML = "";
  screen.appendChild(StatusBar());

  const wrap = el("div", { class: "login-wrap" });

  const wm = el("img", { class: "wordmark-img", src: LOGO_DATA_URL, alt: "the analog company" });
  wrap.appendChild(wm);

  wrap.appendChild(el("div", { class: "welcome" }, ["Check your messages."]));
  const sub = state.phone || "your phone";
  wrap.appendChild(el("div", { class: "welcome-sub" }, [
    `We sent a 6-digit code to ${sub}. It expires in 5 minutes.`,
  ]));

  const otpRow = el("div", { class: "otp-row" });
  for (let i = 0; i < 6; i++) {
    const inp = el("input", {
      class: "otp-box",
      type: "tel",
      maxlength: "1",
      value: state.code[i] || "",
      oninput: (e) => {
        const v = e.target.value.replace(/\D/g, "").slice(0, 1);
        state.code[i] = v;
        e.target.value = v;
        if (v && i < 5) document.querySelectorAll(".otp-box")[i + 1].focus();
        // auto-verify when all filled
        if (state.code.every(c => c !== "")) {
          setTimeout(() => {
            state.view = "queue";
            if (state.countdownInterval) { clearInterval(state.countdownInterval); state.countdownInterval = null; }
            render();
          }, 250);
        }
      },
      onkeydown: (e) => {
        if (e.key === "Backspace" && !state.code[i] && i > 0) {
          document.querySelectorAll(".otp-box")[i - 1].focus();
        }
      },
    });
    otpRow.appendChild(inp);
  }
  wrap.appendChild(otpRow);

  const m = Math.floor(state.countdown / 60);
  const s = (state.countdown % 60).toString().padStart(2, "0");
  const cd = el("div", { class: "countdown" });
  if (state.countdown > 0) {
    cd.innerHTML = `Didn't get it? Resend in <span class="timer">${m}:${s}</span>`;
  } else {
    cd.innerHTML = `<span class="resend">Resend code</span>`;
    cd.querySelector(".resend").addEventListener("click", () => { startCountdown(); render(); });
  }
  wrap.appendChild(cd);

  wrap.appendChild(el("div", { style: { flex: "1" } }));

  wrap.appendChild(el("div", {
    class: "back-link",
    onclick: () => { state.view = "login-phone"; render(); },
  }, ["← back"]));

  screen.appendChild(wrap);

  const footer = el("div", { class: "footer" }, [
    el("div", { class: "footer-text" }, [
      "Need help? ",
      el("span", { class: "link" }, ["Chat with Jaipal"]),
    ]),
  ]);
  screen.appendChild(footer);

  // Auto-focus first empty box
  setTimeout(() => {
    const boxes = document.querySelectorAll(".otp-box");
    for (const b of boxes) { if (!b.value) { b.focus(); break; } }
  }, 50);
}

/* ======================================================================
   Queue: card stack
   ====================================================================== */
function renderQueue() {
  const screen = document.getElementById("screen");
  screen.innerHTML = "";
  screen.appendChild(StatusBar());

  // Top nav
  const topnav = el("div", { class: "topnav" }, [
    el("button", {
      class: "iconbtn",
      "aria-label": "menu",
      html: icons.hamburger,
    }),
    el("img", { class: "wordmark-img", src: LOGO_DATA_URL, alt: "the analog company" }),
    el("span", { style: { width: "22px" } }), // spacer to keep logo centered
  ]);
  screen.appendChild(topnav);

  // Greeting + status
  screen.appendChild(el("div", { class: "greeting" }, ["Good morning, Mira."]));

  const sent = flaggedDrafts.length - state.remaining.length;
  const strip = el("div", { class: "status-strip" });
  strip.innerHTML = `<span><span class="num">${state.remaining.length}</span>drafts</span><span class="sep">·</span><span><span class="num">${sent}</span>sent today</span><span class="sep">·</span><span><span class="num">${state.remaining.length}</span>need your input</span>`;
  screen.appendChild(strip);

  // Stage
  const stage = el("div", { class: "stage", id: "stage" });

  if (state.remaining.length === 0) {
    const empty = el("div", { class: "empty" }, [
      el("div", { class: "empty-mark" }),
      el("div", { class: "empty-title" }, ["You're caught up."]),
      el("div", { class: "empty-sub" }, ["The agent's been sending the easy ones for you."]),
      el("button", { class: "reset-btn", onclick: resetDemo }, ["Reset demo"]),
    ]);
    stage.appendChild(empty);
    screen.appendChild(stage);
    // No swipe hints / footer link visible in caught-up state, just footer
    const footer = el("div", { class: "footer" }, [
      el("div", { class: "footer-text" }, [
        "Need help? ",
        el("span", { class: "link" }, ["Chat with Jaipal"]),
      ]),
    ]);
    screen.appendChild(footer);
    return;
  }

  // Glows (drag feedback)
  const glowR = el("div", { class: "glow glow-right", id: "glowR", style: { opacity: 0 } });
  const glowL = el("div", { class: "glow glow-left", id: "glowL", style: { opacity: 0 } });
  const iconR = el("div", { class: "glow-icon glow-icon-right", id: "iconR", style: { opacity: 0 }, html: icons.sendBig });
  const iconL = el("div", { class: "glow-icon glow-icon-left", id: "iconL", style: { opacity: 0 }, html: icons.pencilBig });
  stage.appendChild(glowR);
  stage.appendChild(glowL);
  stage.appendChild(iconR);
  stage.appendChild(iconL);

  // Peek (next card)
  const peekId = state.remaining[1];
  if (peekId) {
    const peek = el("div", { class: "peek" }, [renderCard(getDraft(peekId), true)]);
    stage.appendChild(peek);
  }

  // Front card
  const front = el("div", { class: "card-wrap", id: "frontCard" }, [
    renderCard(getDraft(state.remaining[0]), false),
  ]);
  stage.appendChild(front);

  // Drag handlers
  const onDown = (e) => {
    if (state.editing || state.exiting) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    state.drag = { dragging: true, startX: x, x: 0 };
  };
  const onMove = (e) => {
    if (!state.drag.dragging) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    state.drag.x = x - state.drag.startX;
    const f = document.getElementById("frontCard");
    if (f) f.style.transform = `translateX(${state.drag.x}px) rotate(${state.drag.x * 0.04}deg)`;
    const intensity = Math.min(1, Math.abs(state.drag.x) / 140);
    if (state.drag.x > 0) {
      glowR.style.opacity = intensity;
      glowL.style.opacity = 0;
      iconR.style.opacity = intensity;
      iconL.style.opacity = 0;
    } else if (state.drag.x < 0) {
      glowL.style.opacity = intensity;
      glowR.style.opacity = 0;
      iconL.style.opacity = intensity;
      iconR.style.opacity = 0;
    } else {
      glowR.style.opacity = 0; glowL.style.opacity = 0;
      iconR.style.opacity = 0; iconL.style.opacity = 0;
    }
  };
  const onUp = () => {
    if (!state.drag.dragging) return;
    const dx = state.drag.x;
    state.drag.dragging = false;
    const f = document.getElementById("frontCard");
    if (dx > 80) {
      // send
      state.exiting = "right";
      if (f) {
        f.style.transition = "transform .25s cubic-bezier(.2,.8,.2,1)";
        f.style.transform = "translateX(440px) rotate(8deg)";
      }
      setTimeout(advance, 240);
    } else if (dx < -80) {
      // edit
      if (f) {
        f.style.transition = "transform .2s cubic-bezier(.2,.8,.2,1)";
        f.style.transform = "translateX(0) rotate(0.3deg)";
      }
      glowL.style.opacity = 0; iconL.style.opacity = 0;
      state.drag.x = 0;
      openEdit();
    } else {
      if (f) {
        f.style.transition = "transform .2s cubic-bezier(.2,.8,.2,1)";
        f.style.transform = "rotate(0.3deg)";
      }
      glowR.style.opacity = 0; glowL.style.opacity = 0;
      iconR.style.opacity = 0; iconL.style.opacity = 0;
      state.drag.x = 0;
    }
  };
  stage.addEventListener("mousedown", onDown);
  stage.addEventListener("mousemove", onMove);
  stage.addEventListener("mouseup", onUp);
  stage.addEventListener("mouseleave", onUp);
  stage.addEventListener("touchstart", onDown, { passive: true });
  stage.addEventListener("touchmove", onMove, { passive: true });
  stage.addEventListener("touchend", onUp);

  // Swipe hints — placed inside the stage so they sit right below the card
  const hints = el("div", { class: "swipe-hints", id: "swipeHints" }, [
    el("span", { class: "left" }, ["← Swipe left to edit"]),
    el("span", { class: "right" }, ["Swipe right to send →"]),
  ]);
  stage.appendChild(hints);

  screen.appendChild(stage);

  // Footer (hidden when editing)
  const footer = el("div", { class: "footer", id: "footer", style: { paddingTop: "16px" } }, [
    el("div", { class: "footer-text" }, [
      "Need help? ",
      el("span", { class: "link" }, ["Chat with Jaipal"]),
    ]),
  ]);
  screen.appendChild(footer);

  // If we're already editing (e.g. re-render after window resize), re-open
  if (state.editing) openEdit();
}

/* Full-screen edit takeover renderer */
function renderEditScreen(data) {
  const root = el("div", { class: "edit-screen", id: "editScreen" });

  // Top bar — back, recipient, spacer
  const topbar = el("div", { class: "edit-topbar" });
  topbar.appendChild(el("button", {
    class: "back-btn",
    onclick: closeEdit,
  }, ["‹  Back"]));

  const recipient = el("div", { class: "recipient" });
  recipient.appendChild(document.createTextNode(`${data.first} ${data.last_init}`));
  const pill = el("span", { class: `pill pill-${data.pillKind}`, style: { marginLeft: "4px" } });
  pill.innerHTML = `<span class="dot"></span>${data.pillLabel}`;
  recipient.appendChild(pill);
  topbar.appendChild(recipient);

  topbar.appendChild(el("div", { class: "spacer" }));
  root.appendChild(topbar);

  // Pinned flagged-because at top
  const flag = el("div", { class: "edit-flag-pin" });
  flag.innerHTML = `<p class="flag-text"><span class="flag-eyebrow">Flagged because:</span>${data.flag}</p>`;
  root.appendChild(flag);

  // Conversation history scroll area
  const thread = el("div", { class: "edit-thread", id: "editThread" });
  const history = conversationHistory[data.id] || [];

  for (const msg of history) {
    if (msg.day) {
      thread.appendChild(el("div", { class: "day-divider" }, [msg.day]));
    }
    if (msg.time && msg.from === "guest") {
      thread.appendChild(el("div", { class: "bubble-time" }, [msg.time]));
    }
    const bubbleClass = msg.from === "guest" ? "bubble-inbound" : "bubble-outbound";
    thread.appendChild(el("div", { class: bubbleClass }, [msg.text]));
  }
  root.appendChild(thread);

  // Composer at bottom — editable input pre-filled with the draft
  const composer = el("div", { class: "edit-composer" });
  const textarea = el("textarea", {
    class: "edit-composer-input",
    id: "editComposerInput",
    rows: 1,
    oninput: (e) => {
      state.editText = e.target.value;
      // Auto-resize
      e.target.style.height = "auto";
      e.target.style.height = Math.min(120, e.target.scrollHeight) + "px";
    },
  }, [state.editText || data.draft]);
  composer.appendChild(textarea);

  const sendBtn = el("button", {
    class: "edit-composer-send",
    "aria-label": "Send",
    html: icons.send,
    onclick: () => {
      // Capture, close, advance card
      closeEdit();
      const f = document.getElementById("frontCard");
      if (f) {
        f.style.transition = "transform .25s cubic-bezier(.2,.8,.2,1)";
        f.style.transform = "translateX(440px) rotate(8deg)";
      }
      setTimeout(advance, 280);
    },
  });
  composer.appendChild(sendBtn);
  root.appendChild(composer);

  return root;
}

function renderCard(d, isPeek) {
  const card = el("div", { class: "card" });

  // Header strip
  const header = el("div", { class: "card-header" });
  header.appendChild(el("span", { class: "name" }, [`${d.first} ${d.last_init}`]));
  const pill = el("span", { class: `pill pill-${d.pillKind}` });
  pill.innerHTML = `<span class="dot"></span>${d.pillLabel}`;
  header.appendChild(pill);
  header.appendChild(el("span", { class: "timestamp" }, [d.timestamp]));
  card.appendChild(header);

  if (isPeek) return card;

  // Flagged
  const flag = el("div", { class: "flag" });
  flag.innerHTML = `<p class="flag-text"><span class="flag-eyebrow">Flagged because:</span>${d.flag}</p>`;
  card.appendChild(flag);

  // Divider
  card.appendChild(el("div", { class: "divider" }));

  // Thread
  const thread = el("div", { class: "thread" });
  for (const msg of d.inbound) {
    thread.appendChild(el("div", { class: "bubble-inbound" }, [msg]));
  }
  card.appendChild(thread);

  // Draft — tappable to enter edit mode (send button stops propagation)
  const draftRow = el("div", { class: "draft-row" });
  const draftBubble = el("div", {
    class: "draft",
    style: { cursor: "text" },
    onclick: (e) => {
      // Ignore drag-induced clicks
      if (Math.abs(state.drag.x) > 5) return;
      openEdit();
    },
  }, [d.draft]);
  const sendBtn = el("button", {
    class: "draft-send",
    "aria-label": "Send",
    html: icons.send,
    onclick: (e) => {
      e.stopPropagation();
      const f = document.getElementById("frontCard");
      if (f) {
        f.style.transition = "transform .25s cubic-bezier(.2,.8,.2,1)";
        f.style.transform = "translateX(440px) rotate(8deg)";
      }
      setTimeout(advance, 240);
    },
  });
  draftBubble.appendChild(sendBtn);
  draftRow.appendChild(draftBubble);
  card.appendChild(draftRow);

  return card;
}

function advance() {
  state.remaining = state.remaining.slice(1);
  state.exiting = null;
  state.editing = false;
  state.editText = "";
  if (state.remaining.length === 0) state.view = "queue"; // re-render shows caught-up
  render();
}

function openEdit() {
  state.editing = true;
  const data = getDraft(state.remaining[0]);
  if (!data) return;
  if (!state.editText) state.editText = data.draft;

  // Inject the full-screen edit takeover
  const screen = document.getElementById("screen");
  // Remove any existing edit screen first
  const existing = document.getElementById("editScreen");
  if (existing) existing.remove();

  const editScreen = renderEditScreen(data);
  screen.appendChild(editScreen);

  // Trigger slide-in
  requestAnimationFrame(() => {
    editScreen.classList.add("open");
    // Auto-resize composer to fit pre-filled text
    setTimeout(() => {
      const ta = document.getElementById("editComposerInput");
      if (ta) {
        ta.style.height = "auto";
        ta.style.height = Math.min(120, ta.scrollHeight) + "px";
        ta.focus();
        ta.setSelectionRange(ta.value.length, ta.value.length);
      }
    }, 280);
  });
}

function closeEdit() {
  state.editing = false;
  state.editText = "";
  const editScreen = document.getElementById("editScreen");
  if (editScreen) {
    editScreen.classList.remove("open");
    setTimeout(() => editScreen.remove(), 320);
  }
}

function resetDemo() {
  state.remaining = flaggedDrafts.map(d => d.id);
  state.editing = false;
  state.editText = "";
  state.drag = { x: 0, dragging: false, startX: 0 };
  state.exiting = null;
  render();
}

/* ======================================================================
   Top-level renderer + nav
   ====================================================================== */
function renderNav() {
  const nav = document.getElementById("navControls");
  nav.innerHTML = "";
  const items = [
    { id: "login-phone", label: "Sign in" },
    { id: "login-code", label: "Code" },
    { id: "queue", label: "Queue" },
  ];
  for (const it of items) {
    const b = el("button", {
      class: state.view === it.id ? "active" : "",
      onclick: () => {
        if (it.id === "login-code" && !state.phone) state.phone = "(415) 555 — 0123";
        if (it.id === "queue") {
          state.remaining = flaggedDrafts.map(d => d.id);
          state.editing = false;
        }
        state.view = it.id;
        if (it.id === "login-code") startCountdown();
        render();
      },
    }, [it.label]);
    nav.appendChild(b);
  }
  // Reset on far right
  const reset = el("button", {
    onclick: () => { resetDemo(); state.view = "login-phone"; state.phone = ""; render(); },
  }, ["Reset"]);
  nav.appendChild(reset);
}

function render() {
  renderNav();
  if (state.view === "login-phone") renderLoginPhone();
  else if (state.view === "login-code") renderLoginCode();
  else renderQueue();
}

render();
</script>
